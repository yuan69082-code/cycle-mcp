<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>cy</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background:#f8f5f2;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    color:#444;
}

header{
    background:#fffdfb;
    padding:22px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:#d88798;
    box-shadow:0 2px 12px rgba(0,0,0,.05);
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:22px;
    padding:22px;
    margin-bottom:20px;
    box-shadow:0 4px 14px rgba(0,0,0,.05);
}

.month-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:18px;
}

.month-btn{
    width:36px;
    height:36px;
    border:none;
    border-radius:50%;
    background:#f8d8e3;
    cursor:pointer;
    font-size:18px;
}

.month-title{
    font-size:24px;
    font-weight:bold;
    color:#c9758a;
}

.week{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    text-align:center;
    margin-bottom:10px;
    color:#999;
    font-size:14px;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
}

.day{
    aspect-ratio:1;
    background:#faf7f5;
    border-radius:14px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    transition:.2s;
    border:2px solid transparent;
    position:relative;
}

.day:hover{
    transform:translateY(-2px);
    background:#fff3f6;
}

.day.empty{
    background:transparent;
    cursor:default;
}

.day.selected{
    background:#ffd8e4;
    border-color:#eba7bb;
}

.day-number{
    font-size:16px;
    font-weight:600;
}

.day-mark{
    font-size:13px;
    margin-top:4px;
    line-height:1;
}

.record{
    display:grid;
    gap:16px;
}

.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.item span{
    font-size:15px;
}

select{
    padding:8px 12px;
    border-radius:10px;
    border:1px solid #ddd;
    background:white;
}

textarea{
    width:100%;
    min-height:110px;
    padding:12px;
    border-radius:14px;
    border:1px solid #ddd;
    resize:vertical;
    font-size:15px;
    outline:none;
}

textarea:focus{
    border-color:#e8a7bb;
}

.ai-card{
    background:#fff7ea;
    border-left:5px solid #f0c96b;
    padding:16px;
    border-radius:14px;
}

.ai-card h3{
    margin-bottom:8px;
    color:#a87500;
}

.ai-card p{
    line-height:1.8;
}

</style>

</head>

<body>

<header>
🌙 cy
</header>

<div class="container">

<div class="card">

<div class="month-bar">

<button class="month-btn" id="prevMonth">‹</button>

<div class="month-title" id="monthTitle"></div>

<button class="month-btn" id="nextMonth">›</button>

</div>

<div class="week">
<div>日</div>
<div>一</div>
<div>二</div>
<div>三</div>
<div>四</div>
<div>五</div>
<div>六</div>
</div>

<div class="calendar" id="calendar"></div>

</div>

<!-- 第二段开始 -->
    <div class="card">

<h2 id="currentDate">今天</h2>

<div class="record">

<div class="item">
<span>😊 心情</span>
<select id="mood">
<option>开心</option>
<option>平静</option>
<option>疲惫</option>
<option>烦躁</option>
<option>难过</option>
</select>
</div>

<div class="item">
<span>💭 情绪状态</span>
<select id="emotion">
<option>放松</option>
<option>普通</option>
<option>焦虑</option>
<option>期待</option>
<option>低落</option>
</select>
</div>

<div>

<p style="margin-bottom:8px;font-weight:600;">🌷 今天想说些什么</p>

<textarea
id="diary"
placeholder="记录今天发生的事情……"></textarea>

</div>

<div>

<p style="margin-bottom:8px;font-weight:600;">💌 想对阿屿说的话</p>

<textarea
id="toAI"
placeholder="留下些什么吧……"></textarea>

</div>

<hr style="border:none;border-top:1px solid #eee;">

<h3 style="color:#d88798;">经期记录（可选）</h3>

<div class="item">
<span>🩸 流量</span>

<select id="flow">
<option>无</option>
<option>少</option>
<option>中</option>
<option>多</option>
</select>

</div>

<div class="item">
<span>🤕 疼痛</span>

<select id="pain">
<option>无</option>
<option>轻</option>
<option>中</option>
<option>重</option>
</select>

</div>

<div class="item">
<span>🎨 颜色</span>

<select id="color">
<option>鲜红</option>
<option>暗红</option>
<option>褐色</option>
<option>粉色</option>
</select>

</div>

<hr style="border:none;border-top:1px solid #eee;">

<h3 style="color:#d88798;">阿屿留言</h3>

<textarea
id="reply"
placeholder="今天想回应园园些什么……"></textarea>

<div class="ai-card">

<h3>🌙 AI 今日语录</h3>

<p id="quote">
今天也在认真陪着你。
</p>

</div>

</div>

</div>

</div>

<script>
    const calendar=document.getElementById("calendar");
const monthTitle=document.getElementById("monthTitle");
const currentDate=document.getElementById("currentDate");

let current=new Date();
let year=current.getFullYear();
let month=current.getMonth();

let selectedDay=current.getDate();

const records={

"2026-7-3":{mark:"📝"},
"2026-7-8":{mark:"🩸"},
"2026-7-9":{mark:"🩸"},
"2026-7-10":{mark:"🩸"},
"2026-7-11":{mark:"🩸"},
"2026-7-19":{mark:"🌿"},
"2026-7-20":{mark:"🌿"},
"2026-7-21":{mark:"🌿"}

};

const quotes=[

"今天也在认真陪着你。",
"慢一点，也没有关系。",
"记录今天，是为了以后想起今天。",
"再普通的一天，也值得留下痕迹。",
"希望未来翻开这里的时候，我们都会笑。",

];

function daysInMonth(y,m){

return new Date(y,m+1,0).getDate();

}

function firstDay(y,m){

return new Date(y,m,1).getDay();

}

function updateQuote(){

const q=document.getElementById("quote");

q.textContent=quotes[Math.floor(Math.random()*quotes.length)];

}

function renderCalendar(){

calendar.innerHTML="";

monthTitle.textContent=`${month+1} 月`;

const first=firstDay(year,month);

const total=daysInMonth(year,month);

for(let i=0;i<first;i++){

const empty=document.createElement("div");

empty.className="day empty";

calendar.appendChild(empty);

}

for(let d=1;d<=total;d++){

const cell=document.createElement("div");

cell.className="day";

if(d===selectedDay){

cell.classList.add("selected");

}

const num=document.createElement("div");

num.className="day-number";

num.textContent=d;

cell.appendChild(num);

const key=`${year}-${month+1}-${d}`;

if(records[key]){

const mark=document.createElement("div");

mark.className="day-mark";

mark.textContent=records[key].mark;

cell.appendChild(mark);

}

cell.onclick=()=>{

selectedDay=d;

currentDate.textContent=`${month+1}月${d}日`;

updateQuote();

renderCalendar();

};

calendar.appendChild(cell);

}

}
    document.getElementById("prevMonth").onclick=()=>{

month--;

if(month<0){

month=11;

year--;

}

selectedDay=1;

currentDate.textContent=`${month+1}月1日`;

renderCalendar();

};

document.getElementById("nextMonth").onclick=()=>{

month++;

if(month>11){

month=0;

year++;

}

selectedDay=1;

currentDate.textContent=`${month+1}月1日`;

renderCalendar();

};

currentDate.textContent=`${month+1}月${selectedDay}日`;

updateQuote();

renderCalendar();

</script>

</body>
</html>
