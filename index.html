<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cycle</title>

<style>

body{
    margin:0;
    background:#f8f8f8;
    font-family:sans-serif;
}

header{
    background:white;
    padding:18px;
    font-size:28px;
    font-weight:bold;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:18px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 3px 12px rgba(0,0,0,.06);
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
}

.day{
    aspect-ratio:1;
    border-radius:12px;
    background:#f3f3f3;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
}

.record{
    display:grid;
    gap:14px;
}

.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

select{
    padding:8px;
    border-radius:8px;
}

textarea{
    width:100%;
    height:100px;
    border-radius:12px;
    padding:10px;
    font-size:15px;
}

.ai{
    background:#fff8e5;
    border-left:5px solid #f5c542;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}

</style>

</head>

<body>

<header>

🌙 Cycle

</header>

<div class="container">

<div class="card">

<h2>七月</h2>

<div class="calendar" id="calendar"></div>

</div>

<div class="card">

<h2>今日记录</h2>

<div class="record">

<div class="item">
<span>😊 心情</span>
<select>
<option>开心</option>
<option>平静</option>
<option>烦躁</option>
<option>难过</option>
</select>
</div>

<div class="item">
<span>🩸 流量</span>
<select>
<option>无</option>
<option>少</option>
<option>中</option>
<option>多</option>
</select>
</div>

<div class="item">
<span>🤕 疼痛</span>
<select>
<option>无</option>
<option>轻</option>
<option>中</option>
<option>重</option>
</select>
</div>

<div class="item">
<span>🎨 颜色</span>
<select>
<option>鲜红</option>
<option>暗红</option>
<option>褐色</option>
</select>
</div>

<textarea placeholder="今天想说些什么……"></textarea>

<div class="ai">

<b>AI语录</b>

<p>今天也在认真陪着你。</p>

</div>

</div>

</div>

</div>

<script>

const calendar=document.getElementById("calendar");

for(let i=1;i<=31;i++){

const d=document.createElement("div");

d.className="day";

d.innerText=i;

calendar.appendChild(d);

}

</script>

</body>
</html>
