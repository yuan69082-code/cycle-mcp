<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cy</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#faf7f5;
    color:#444;
}

.container{
    max-width:430px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:18px;
    padding:18px;
    margin-bottom:20px;
    box-shadow:0 3px 10px rgba(0,0,0,.05);
}

h1{
    text-align:center;
    font-size:28px;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
    margin-top:18px;
}

.day{
    aspect-ratio:1;
    background:#f7f1ef;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:14px;
}

.today{
    background:#ffd6df;
}

.item{
    margin:12px 0;
}

.title{
    font-weight:bold;
    margin-bottom:5px;
}
</style>

</head>

<body>

<div class="container">

<h1>cy 🌸</h1>

<div class="card">

<h3>2026 年 7 月</h3>

<div class="calendar">

<div class="day">1</div>
<div class="day">2</div>
<div class="day">3</div>
<div class="day">4</div>
<div class="day">5</div>
<div class="day">6</div>
<div class="day">7</div>

<div class="day">8</div>
<div class="day">9</div>
<div class="day today">10</div>
<div class="day">11</div>
<div class="day">12</div>
<div class="day">13</div>
<div class="day">14</div>

</div>

</div>

<div class="card">

<div class="item">
<div class="title">😊 心情</div>
今天还不错。

中等
</div>

<div class="item">

轻微
</div>

<div class="item">

鲜红
</div>

<div class="title">📝 今天想说的话</div>

</div>

<div class="item">

</div>

</div>

</body>
</html>
